[project]
name = "soccer-vision"
version = "0.1.0"
description = "Team-level positional analytics for 9v9 youth soccer from Trace camera footage"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pandas>=2.2",
    "pyarrow>=17.0",
    "numpy>=1.26",
    "pydantic>=2.7",
    "scipy>=1.13",
    "shapely>=2.0",
    "matplotlib>=3.9",
    "opencv-python>=4.9",
]

[project.optional-dependencies]
roboflow = [
    "ultralytics>=8.2",
    "supervision>=0.22",
    "torch>=2.0",
    "gdown>=5.0",
    "sports @ git+https://github.com/roboflow/sports.git",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/soccer_vision"]

# The `roboflow` extra pins `sports` to a git URL (no PyPI release); hatchling
# refuses direct references in metadata unless explicitly allowed.
[tool.hatch.metadata]
allow-direct-references = true
